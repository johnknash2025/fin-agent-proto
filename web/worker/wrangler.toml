name = "fin-agent-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# TODO: fill these with your account details before deploy
# account_id = "YOUR_ACCOUNT_ID"

# Optional route if you bind to a custom domain
# routes = [
#   { pattern = "your-domain.example.com", custom_domain = true }
# ]

[vars]
# NEWSAPI_KEY = ""
# ALPHA_VANTAGE_KEY = ""
# SEC_USER_AGENT = "fin-agent (contact: you@example.com)"

[[kv_namespaces]]
binding = "NEWS_CACHE"
# id = "<KV_NAMESPACE_ID>"

[[kv_namespaces]]
binding = "SERIES_CACHE"
# id = "<KV_NAMESPACE_ID>"

[[kv_namespaces]]
binding = "SUBS_KV"
# id = "<KV_NAMESPACE_ID>"

[[r2_buckets]]
binding = "R2"
bucket_name = "fin-agent"
# jurisdiction = "auto"

