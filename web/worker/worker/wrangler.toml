name = "fin-agent-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# account_id = "YOUR_ACCOUNT_ID"

[vars]
# NEWSAPI_KEY = ""
# ALPHA_VANTAGE_KEY = ""
# SEC_USER_AGENT = "fin-agent (contact: you@example.com)"
# SERIES_DEFAULT = "VOO,SPY,QQQ,AAPL,MSFT,NVDA,AMZN"

[[kv_namespaces]]
binding = "NEWS_CACHE"
id = "dev_NEWS_CACHE"
preview_id = "dev_NEWS_CACHE"

[[kv_namespaces]]
binding = "SERIES_CACHE"
id = "dev_SERIES_CACHE"
preview_id = "dev_SERIES_CACHE"

[[kv_namespaces]]
binding = "SUBS_KV"
id = "dev_SUBS_KV"
preview_id = "dev_SUBS_KV"

[[r2_buckets]]
binding = "R2"
bucket_name = "fin-agent"
# jurisdiction = "auto"

[[d1_databases]]
binding = "DB"
database_name = "fin-agent-dev"
database_id = "11111111-1111-1111-1111-111111111111"

[assets]
directory = "../../ui"

[triggers]
# Run once daily at 09:00 UTC (example). Adjust as needed.
crons = ["0 9 * * *"]
