<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fin Agent Proto</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://s3.tradingview.com/tv.js"></script>
  </head>
  <body>
    <header>
      <h1>Fin Agent Proto</h1>
      <nav>
        <button id="btn-health">Health</button>
      </nav>
    </header>

    <main>
      <section class="hero card">
        <div class="hero-title">市場分析レポートを、3ステップで。</div>
        <ol class="steps">
          <li><span class="step-badge">1</span> シンボルを選ぶ（候補をクリック）</li>
          <li><span class="step-badge">2</span> チャートと構成を確認</li>
          <li><span class="step-badge">3</span> レポートを生成（ニュース任意）</li>
        </ol>
        <div class="hero-actions">
          <button id="btn-quick" class="primary">クイックスタート（VOO / SPY / QQQ）</button>
          <button id="btn-reset" class="ghost">リセット</button>
        </div>
      </section>

      <section class="card">
        <h2>シンボル選択 <span class="hint">（候補をクリックすると追加されます）</span></h2>
        <div class="row wrap">
          <div>
            <input id="symbol-input" type="text" placeholder="例: VOO" />
            <button id="btn-add">追加</button>
          </div>
          <div id="popular" class="chips" aria-label="人気銘柄"></div>
        </div>
        <div class="label">候補</div>
        <div id="symbol-suggest" class="chips"></div>
        <div class="label">選択中</div>
        <div id="selected" class="chips empty-state" data-empty-text="まだ選択されていません。上の候補からクリックして追加してください。"></div>
      </section>

      <section class="card">
        <h2>チャートと構成銘柄</h2>
        <div id="panels" class="panels empty-state" data-empty-text="シンボルを追加すると、ここにチャートが表示されます。"></div>
      </section>

      <section class="card">
        <h2>レポート生成</h2>
        <div class="row">
          <label><input id="news" type="checkbox" /> ニュースを含める</label>
          <button id="btn-report">生成</button>
        </div>
        <div id="report-html" class="md"></div>
      </section>

      <section class="card">
        <h2>ニュース検索</h2>
        <div class="row">
          <input id="news-q" type="text" placeholder="例: 米国 金利 決算" />
          <button id="btn-news">検索</button>
        </div>
        <ul id="news-list" class="news"></ul>
      </section>

      <section class="card">
        <h2>データアップロード（開発用）</h2>
        <div class="row">
          <select id="up-type"><option value="series">series</option><option value="holdings">holdings</option></select>
          <input id="up-symbol" type="text" placeholder="例: VOO" />
          <input id="up-file" type="file" accept="application/json" />
          <button id="btn-upload">アップロード</button>
        </div>
        <div id="up-result" class="mono"></div>
      </section>
    </main>

    <footer>
      <small>Local dev UI. Seed R2 with sample data for meaningful output.</small>
    </footer>

    <script src="/app.js"></script>
  </body>
  </html>
